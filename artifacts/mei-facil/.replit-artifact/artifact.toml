kind = "web"
previewPath = "/"
title = "MEI Fácil"
version = "1.0.0"
id = "artifacts/mei-facil"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24200

[services.development]
run = "pnpm --filter @workspace/mei-facil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mei-facil", "run", "build" ]
publicDir = "artifacts/mei-facil/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24200"
BASE_PATH = "/"
